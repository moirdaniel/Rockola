# Rockola Digital - Docker Compose (producción)
# timezone America/Santiago, puertos sin conflicto

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    environment:
      TZ: America/Santiago
      DATABASE_URL: sqlite:/app/data/rockola.db
      RUST_LOG: info
      PORT: 3000
      COST_PER_SONG: 100
    volumes:
      - backend_data:/app/data
    expose:
      - "3000"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "8080:80"
    environment:
      TZ: America/Santiago
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
